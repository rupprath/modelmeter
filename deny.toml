[graph]
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]
deny = []
# Allow ring's non-standard license (used transitively by rustls)
exceptions = [
    { allow = ["ISC", "MIT", "OpenSSL"], name = "ring" },
]

[bans]
multiple-versions = "warn"
deny = [
    # Prevent OpenSSL — use rustls only
    { name = "openssl" },
    { name = "openssl-sys" },
    # Prevent native-tls — we use rustls with webpki-roots exclusively
    { name = "native-tls" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
